# FitRPG Pi nginx configuration
# Place at: /etc/nginx/sites-available/fitrpg
# Enable: sudo ln -sf /etc/nginx/sites-available/fitrpg /etc/nginx/sites-enabled/fitrpg

# Serve Defend the Valley (built Vite dist/) on port 5173
server {
    listen 5173;
    root /home/pi/FitRPG/games/defend-the-valley/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Proxy Next.js dashboard on port 80
server {
    listen 80;
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
